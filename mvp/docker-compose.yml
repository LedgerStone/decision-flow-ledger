version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: aip_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: aip_neo4j
    env_file: .env
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  ledger-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aip_ledger
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_KEY: ${API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - blockchain_data:/data/blockchain
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  blockchain_data:
